# yaml-language-server: $schema=https://json.schemastore.org/lazydocker.json
gui:
  returnImmediately: true
  border: rounded
  containerStatusHealthStyle: short
customCommands:
  containers:
    - name: exec psql
      attach: true
      command: docker exec -it {{ .Container.ID }} sh -c 'psql -U $POSTGRES_USER -d $POSTGRES_DB'
